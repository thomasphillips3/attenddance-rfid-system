app = 'attenddance'
primary_region = 'lax'

[build]

[env]
  FLASK_ENV = 'production'
  DATABASE_URL = 'sqlite:////data/attendance.db'
  SECRET_KEY = 'fly-demo-key-change-for-real-prod'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'attenddance_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
