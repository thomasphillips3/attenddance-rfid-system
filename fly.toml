app = 'attenddance'
primary_region = 'lax'

[build]

[env]
  FLASK_ENV = 'production'
  DATABASE_URL = 'sqlite:////data/attendance.db'
  # SECRET_KEY is intentionally NOT set here — [env] values are committed and
  # public. It must be a Fly *secret* so it stays out of git:
  #   fly secrets set SECRET_KEY=$(python3 -c 'import secrets;print(secrets.token_hex(32))')
  # The app refuses to boot in production without a strong one (see app/__init__.py).

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'attenddance_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
