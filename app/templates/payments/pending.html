{% extends "base.html" %}

{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Pending Payments</h1>
                    <p class="mt-1 text-sm text-gray-600">Confirm payments parents sent via Zelle, Cash App, etc.</p>
                </div>
                <div class="flex gap-2">
                    <select id="status-filter" onchange="loadPending()" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="rejected">Rejected</option>
                        <option value="all">All</option>
                    </select>
                    <button onclick="sendReminders()" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-amber-600 hover:bg-amber-700">
                        <i class="fas fa-bell mr-2"></i>Send Balance Reminders
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="status-msg" class="hidden mb-4 p-3 rounded-md text-sm font-medium"></div>

        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">When</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">For</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Reported by</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Amount</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Method</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Reference</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                    </tr>
                </thead>
                <tbody id="pending-table" class="bg-white divide-y divide-gray-100">
                    <tr><td colspan="7" class="px-4 py-6 text-center text-gray-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Audit log -->
        <div class="mt-10">
            <h2 class="text-lg font-semibold text-gray-900 mb-3">Recent Activity</h2>
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">When</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Who</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Detail</th>
                        </tr>
                    </thead>
                    <tbody id="audit-table" class="bg-white divide-y divide-gray-100">
                        <tr><td colspan="4" class="px-4 py-4 text-center text-gray-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const METHOD_LABELS = {zelle: 'Zelle', cashapp: 'Cash App', square: 'Square', cash: 'Cash', venmo: 'Venmo', other: 'Other'};

function showMsg(text, ok) {
    const m = document.getElementById('status-msg');
    m.textContent = text;
    m.className = 'mb-4 p-3 rounded-md text-sm font-medium ' + (ok ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800');
    m.classList.remove('hidden');
    setTimeout(() => m.classList.add('hidden'), 4000);
}

function esc(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadPending() {
    const status = document.getElementById('status-filter').value;
    const tbody = document.getElementById('pending-table');
    try {
        const res = await fetch('/api/pending-payments?status=' + status);
        const data = await res.json();
        const rows = data.pending_payments || [];
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-6 text-center text-gray-500">Nothing here.</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(p => {
            const when = new Date(p.created_at).toLocaleString();
            const badge = p.status === 'pending'
                ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Pending</span>`
                : p.status === 'confirmed'
                ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Confirmed</span>`
                : `<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-gray-200 text-gray-700">Rejected</span>`;
            const action = p.status === 'pending'
                ? `<button onclick="confirmPay(${p.id})" class="px-3 py-1 bg-green-600 text-white rounded text-xs font-medium hover:bg-green-700 mr-1">Confirm</button>
                   <button onclick="rejectPay(${p.id})" class="px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs font-medium hover:bg-gray-300">Reject</button>`
                : badge + (p.admin_note ? `<div class="text-xs text-gray-400 mt-1">${esc(p.admin_note)}</div>` : '');
            return `<tr>
                <td class="px-4 py-3 text-sm text-gray-600">${when}</td>
                <td class="px-4 py-3 text-sm font-medium text-gray-900">${esc(p.who)}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${esc(p.parent_name || '')}</td>
                <td class="px-4 py-3 text-sm text-right font-semibold text-gray-900">$${p.amount}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${METHOD_LABELS[p.method] || p.method}</td>
                <td class="px-4 py-3 text-sm text-gray-500">${esc(p.reference || '—')}${p.note ? '<div class="text-xs text-gray-400">' + esc(p.note) + '</div>' : ''}</td>
                <td class="px-4 py-3 text-sm text-right">${action}</td>
            </tr>`;
        }).join('');
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-6 text-center text-red-500">Failed to load.</td></tr>';
    }
}

async function confirmPay(id) {
    if (!confirm('Confirm this payment? It will be recorded and the balance reduced.')) return;
    try {
        const res = await fetch(`/api/pending-payments/${id}/confirm`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'});
        const d = await res.json();
        showMsg(res.ok ? d.message : (d.error || 'Error'), res.ok);
        loadPending(); loadAudit();
    } catch { showMsg('Network error', false); }
}

async function rejectPay(id) {
    const note = prompt('Reason for rejecting (optional):') || '';
    try {
        const res = await fetch(`/api/pending-payments/${id}/reject`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({admin_note: note}),
        });
        const d = await res.json();
        showMsg(res.ok ? d.message : (d.error || 'Error'), res.ok);
        loadPending(); loadAudit();
    } catch { showMsg('Network error', false); }
}

async function sendReminders() {
    if (!confirm('Email a balance reminder to every student who owes money?')) return;
    try {
        const res = await fetch('/api/balances/send-reminders', {method: 'POST'});
        const d = await res.json();
        showMsg(res.ok ? d.message : (d.error || 'Error'), res.ok);
        loadAudit();
    } catch { showMsg('Network error', false); }
}

async function loadAudit() {
    const tbody = document.getElementById('audit-table');
    try {
        const res = await fetch('/api/audit-log?limit=25');
        const data = await res.json();
        const rows = data.entries || [];
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-4 text-center text-gray-500">No activity yet.</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(r => `<tr>
            <td class="px-4 py-2 text-sm text-gray-600">${new Date(r.created_at).toLocaleString()}</td>
            <td class="px-4 py-2 text-sm text-gray-900">${esc(r.user)}</td>
            <td class="px-4 py-2 text-sm text-gray-600"><code class="text-xs">${esc(r.action)}</code></td>
            <td class="px-4 py-2 text-sm text-gray-500">${esc(r.detail || '')}</td>
        </tr>`).join('');
    } catch {
        tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-4 text-center text-red-500">Failed to load.</td></tr>';
    }
}

loadPending();
loadAudit();
</script>
{% endblock %}
