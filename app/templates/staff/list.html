{% extends "base.html" %}

{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Staff</h1>
                    <p class="mt-1 text-sm text-gray-600">Manage teachers and administrators</p>
                </div>
                <button onclick="openAddModal()" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">
                    <i class="fas fa-user-plus mr-2"></i>Add Teacher
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Login</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="staff-table" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">Loading staff...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="staff-modal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeModal()"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
            <h3 id="modal-title" class="text-lg font-medium text-gray-900 mb-4">Add Teacher</h3>
            <form id="staff-form" onsubmit="saveStaff(event)">
                <input type="hidden" id="staff-id">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">First Name *</label>
                            <input type="text" id="first_name" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Last Name *</label>
                            <input type="text" id="last_name" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username *</label>
                        <input type="text" id="username" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email *</label>
                        <input type="email" id="email" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Phone</label>
                        <input type="tel" id="phone" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Role *</label>
                        <select id="role" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700" id="password-label">Password *</label>
                        <input type="password" id="password" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                        <p id="password-hint" class="mt-1 text-xs text-gray-500 hidden">Leave blank to keep current password</p>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

let allStaff = [];

async function loadStaff() {
    try {
        const res = await fetch('/api/staff');
        const data = await res.json();
        allStaff = data.staff;
        renderStaff(allStaff);
    } catch (err) {
        document.getElementById('staff-table').innerHTML =
            '<tr><td colspan="7" class="px-6 py-8 text-center text-red-500">Failed to load staff</td></tr>';
    }
}

function renderStaff(staff) {
    const tbody = document.getElementById('staff-table');
    if (!staff.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">No staff found.</td></tr>';
        return;
    }
    tbody.innerHTML = staff.map(s => `
        <tr class="${!s.is_active ? 'bg-gray-50 opacity-60' : ''}">
            <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                    <div class="h-8 w-8 rounded-full ${s.is_admin ? 'bg-purple-100' : 'bg-primary-100'} flex items-center justify-center">
                        <span class="text-xs font-medium ${s.is_admin ? 'text-purple-700' : 'text-primary-700'}">${esc(s.first_name[0])}${esc(s.last_name[0])}</span>
                    </div>
                    <div class="ml-3 text-sm font-medium text-gray-900">${esc(s.full_name)}</div>
                </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${esc(s.username)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${esc(s.email)}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${esc(s.phone || '-')}</td>
            <td class="px-6 py-4 whitespace-nowrap">
                ${s.is_admin
                    ? '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800"><i class="fas fa-shield-alt mr-1"></i>Admin</span>'
                    : '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"><i class="fas fa-chalkboard-teacher mr-1"></i>Teacher</span>'}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${s.last_login ? new Date(s.last_login).toLocaleDateString() : 'Never'}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button data-id="${s.id}" class="edit-btn text-primary-600 hover:text-primary-900 mr-3" title="Edit"><i class="fas fa-edit"></i></button>
                ${s.is_active
                    ? `<button data-id="${s.id}" data-name="${esc(s.full_name)}" class="delete-btn text-red-600 hover:text-red-900" title="Deactivate"><i class="fas fa-user-slash"></i></button>`
                    : '<span class="text-xs text-gray-400">Inactive</span>'}
            </td>
        </tr>
    `).join('');

    tbody.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const user = allStaff.find(u => u.id === parseInt(btn.dataset.id));
            if (user) editStaff(user);
        });
    });
    tbody.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deactivateStaff(parseInt(btn.dataset.id), btn.dataset.name));
    });
}

function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Teacher';
    document.getElementById('staff-form').reset();
    document.getElementById('staff-id').value = '';
    document.getElementById('username').removeAttribute('disabled');
    document.getElementById('password').setAttribute('required', '');
    document.getElementById('password-label').textContent = 'Password *';
    document.getElementById('password-hint').classList.add('hidden');
    document.getElementById('staff-modal').classList.remove('hidden');
}

function editStaff(s) {
    document.getElementById('modal-title').textContent = 'Edit Staff';
    document.getElementById('staff-id').value = s.id;
    document.getElementById('first_name').value = s.first_name;
    document.getElementById('last_name').value = s.last_name;
    document.getElementById('username').value = s.username;
    document.getElementById('username').setAttribute('disabled', '');
    document.getElementById('email').value = s.email;
    document.getElementById('phone').value = s.phone || '';
    document.getElementById('role').value = s.role;
    document.getElementById('password').value = '';
    document.getElementById('password').removeAttribute('required');
    document.getElementById('password-label').textContent = 'Password';
    document.getElementById('password-hint').classList.remove('hidden');
    document.getElementById('staff-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('staff-modal').classList.add('hidden'); }

async function saveStaff(e) {
    e.preventDefault();
    const id = document.getElementById('staff-id').value;
    const body = {
        first_name: document.getElementById('first_name').value,
        last_name: document.getElementById('last_name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        role: document.getElementById('role').value,
    };
    if (!id) {
        body.username = document.getElementById('username').value;
    }
    const pw = document.getElementById('password').value;
    if (pw) body.password = pw;

    if (!id && !pw) {
        alert('Password is required for new accounts');
        return;
    }

    const url = id ? `/api/staff/${id}` : '/api/staff';
    try {
        const res = await fetch(url, {
            method: id ? 'PUT' : 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        if (res.ok) {
            closeModal();
            loadStaff();
        } else {
            const d = await res.json();
            alert(d.error || 'Error saving staff');
        }
    } catch (err) {
        alert('Network error');
    }
}

async function deactivateStaff(id, name) {
    if (!confirm(`Deactivate ${name}? They will no longer be able to log in.`)) return;
    try {
        const res = await fetch(`/api/staff/${id}`, { method: 'DELETE' });
        if (res.ok) {
            loadStaff();
        } else {
            const d = await res.json();
            alert(d.error || 'Error deactivating staff');
        }
    } catch (err) {
        alert('Network error');
    }
}

loadStaff();
</script>
{% endblock %}
