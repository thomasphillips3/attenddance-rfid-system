{% extends "base.html" %}

{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Attendance</h1>
                    <p class="mt-1 text-sm text-gray-600">Track student check-ins</p>
                </div>
                <button onclick="openCheckinModal()" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">
                    <i class="fas fa-hand-paper mr-2"></i>Manual Check-in
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-white shadow-lg rounded-lg overflow-hidden mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-medium text-gray-900"><i class="fas fa-calendar-day text-primary-500 mr-2"></i>Today's Attendance</h3>
            </div>
            <div id="today-attendance" class="px-6 py-4"><p class="text-gray-500">Loading...</p></div>
        </div>

        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-medium text-gray-900"><i class="fas fa-history text-primary-500 mr-2"></i>Attendance History</h3>
            </div>
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Class</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Method</th>
                    </tr>
                </thead>
                <tbody id="attendance-table" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="checkin-modal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeCheckinModal()"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Manual Check-in</h3>
            <form id="checkin-form" onsubmit="doCheckin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Student *</label>
                        <select id="checkin-student" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm"><option value="">Select student...</option></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Class *</label>
                        <select id="checkin-class" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm"><option value="">Select class...</option></select>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" onclick="closeCheckinModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">Check In</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function loadToday() {
    try {
        const res = await fetch('/api/attendance/today');
        const data = await res.json();
        const el = document.getElementById('today-attendance');
        if (!data.attendance.length) { el.innerHTML = '<p class="text-gray-500">No check-ins today yet.</p>'; return; }
        el.innerHTML = `<p class="text-sm text-gray-600 mb-3">${data.count} check-in(s) today</p>` +
            data.attendance.map(a => `<div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0"><span class="text-sm font-medium text-gray-900">${esc(a.student_name)}</span><span class="text-sm text-gray-500">${esc(a.class_name)} - ${new Date(a.check_in_time).toLocaleTimeString()}</span></div>`).join('');
    } catch (err) { document.getElementById('today-attendance').innerHTML = '<p class="text-red-500">Failed to load</p>'; }
}

async function loadHistory() {
    try {
        const res = await fetch('/api/attendance?per_page=50');
        const data = await res.json();
        const tbody = document.getElementById('attendance-table');
        if (!data.attendance.length) { tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No attendance records yet.</td></tr>'; return; }
        tbody.innerHTML = data.attendance.map(a => `
            <tr>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${esc(a.student_name)}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${esc(a.class_name)}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${a.attendance_date}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${new Date(a.check_in_time).toLocaleTimeString()}</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${a.check_in_method === 'rfid' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'}">
                        <i class="fas fa-${a.check_in_method === 'rfid' ? 'credit-card' : 'hand-paper'} mr-1"></i>${a.check_in_method}
                    </span>
                </td>
            </tr>
        `).join('');
    } catch (err) { document.getElementById('attendance-table').innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">Failed to load</td></tr>'; }
}

async function openCheckinModal() {
    document.getElementById('checkin-modal').classList.remove('hidden');
    const [sRes, cRes] = await Promise.all([fetch('/api/students?per_page=100'), fetch('/api/classes')]);
    const sData = await sRes.json(), cData = await cRes.json();
    document.getElementById('checkin-student').innerHTML = '<option value="">Select student...</option>' + sData.students.map(s => `<option value="${s.id}">${esc(s.full_name)}</option>`).join('');
    document.getElementById('checkin-class').innerHTML = '<option value="">Select class...</option>' + cData.classes.map(c => `<option value="${c.id}">${esc(c.name)} (${esc(c.day_name)} ${esc(c.start_time)})</option>`).join('');
}

function closeCheckinModal() { document.getElementById('checkin-modal').classList.add('hidden'); }

async function doCheckin(e) {
    e.preventDefault();
    const body = { student_id: parseInt(document.getElementById('checkin-student').value), class_id: parseInt(document.getElementById('checkin-class').value) };
    try {
        const res = await fetch('/api/attendance/checkin', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) { closeCheckinModal(); loadToday(); loadHistory(); alert(data.message); } else { alert(data.error || 'Check-in failed'); }
    } catch (err) { alert('Network error'); }
}

loadToday();
loadHistory();
</script>
{% endblock %}
