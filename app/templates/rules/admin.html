{% extends "base.html" %}

{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Rules &amp; Regulations</h1>
                    <p class="mt-1 text-sm text-gray-600">Manage studio rules that parents must initial before enrollment</p>
                </div>
                <button onclick="openAddRule()" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">
                    <i class="fas fa-plus mr-2"></i>Add Rule
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <h2 class="text-lg font-semibold text-gray-900 mb-3">Studio Rules</h2>
        <div id="rules-list" class="space-y-3 mb-8"><p class="text-gray-500">Loading...</p></div>

        <h2 class="text-lg font-semibold text-gray-900 mb-3">Acknowledgment Status</h2>
        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Progress</th>
                    </tr>
                </thead>
                <tbody id="ack-table" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="rule-modal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeRuleModal()"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Add Rule</h3>
            <form id="rule-form" onsubmit="saveRule(event)">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Rule Text *</label>
                    <textarea id="rule-text" rows="3" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500" placeholder="e.g. Students must arrive 5 minutes before class starts."></textarea>
                </div>
                <div class="mt-4 flex justify-end space-x-3">
                    <button type="button" onclick="closeRuleModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function loadRules() {
    try {
        const res = await fetch('/api/rules');
        const data = await res.json();
        renderRules(data.rules);
    } catch (err) {
        document.getElementById('rules-list').innerHTML = '<p class="text-red-500">Failed to load</p>';
    }
}
function renderRules(rules) {
    const el = document.getElementById('rules-list');
    if (!rules.length) { el.innerHTML = '<p class="text-gray-500">No rules yet. Click "Add Rule" to create your studio rules.</p>'; return; }
    el.innerHTML = rules.map((r, i) => `
        <div class="bg-white shadow rounded-lg p-4 flex items-start justify-between">
            <div class="flex items-start">
                <span class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-100 text-primary-700 flex items-center justify-center text-sm font-bold mr-3">${i + 1}</span>
                <p class="text-sm text-gray-900 pt-1">${esc(r.text)}</p>
            </div>
            <button onclick="deleteRule(${r.id})" class="ml-3 text-red-500 hover:text-red-700 flex-shrink-0"><i class="fas fa-trash"></i></button>
        </div>
    `).join('');
}

const studentIds = [{% for s in students %}{{ s.id }},{% endfor %}];
const studentNames = { {% for s in students %}{{ s.id }}: '{{ s.full_name }}',{% endfor %} };

async function loadAckStatus() {
    const tbody = document.getElementById('ack-table');
    if (!studentIds.length) { tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">No students</td></tr>'; return; }
    const rows = [];
    for (const sid of studentIds) {
        try {
            const res = await fetch('/api/students/' + sid + '/rules-status');
            const data = await res.json();
            if (data.total === 0) continue;
            const pct = Math.round((data.acknowledged / data.total) * 100);
            const tag = data.complete
                ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Complete</span>'
                : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Incomplete</span>';
            rows.push('<tr><td class="px-6 py-3 text-sm font-medium text-gray-900">' + esc(studentNames[sid]) + '</td><td class="px-6 py-3">' + tag + '</td><td class="px-6 py-3 text-sm text-gray-500">' + data.acknowledged + '/' + data.total + ' (' + pct + '%)</td></tr>');
        } catch (err) {}
    }
    tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Add rules first to see acknowledgment status</td></tr>';
}

function openAddRule() { document.getElementById('rule-form').reset(); document.getElementById('rule-modal').classList.remove('hidden'); }
function closeRuleModal() { document.getElementById('rule-modal').classList.add('hidden'); }

async function saveRule(e) {
    e.preventDefault();
    try {
        const res = await fetch('/api/rules', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ text: document.getElementById('rule-text').value }) });
        if (res.ok) { closeRuleModal(); loadRules(); loadAckStatus(); } else { const d = await res.json(); alert(d.error || 'Error'); }
    } catch (err) { alert('Network error'); }
}

async function deleteRule(id) {
    if (!confirm('Remove this rule?')) return;
    await fetch('/api/rules/' + id, { method: 'DELETE' });
    loadRules(); loadAckStatus();
}

loadRules();
loadAckStatus();
</script>
{% endblock %}
