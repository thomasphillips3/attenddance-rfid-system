{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('main.parent_dashboard') }}" class="text-sm text-primary-600 hover:text-primary-900"><i class="fas fa-arrow-left mr-1"></i>Back</a>
        <h1 class="font-display text-3xl text-ink leading-tight mt-1">Rules &amp; Regulations</h1>
        <p class="text-sm text-ink-2 mt-1">Please read each rule and type your initials to acknowledge — {{ student.full_name }}</p>
    </div>

    <div id="status-bar" class="mb-6 bg-surface border border-line rounded-2xl shadow-soft p-4 flex items-center justify-between hidden">
        <span id="status-text" class="text-sm font-medium text-ink"></span>
        <div id="status-badge"></div>
    </div>
    <div id="rules-container" class="space-y-4">
        <p class="text-ink-3">Loading rules...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
const studentId = {{ student.id }};

async function loadRulesStatus() {
    try {
        const res = await fetch('/api/students/' + studentId + '/rules-status');
        const data = await res.json();
        renderRules(data.rules, data.acknowledged, data.total, data.complete);
    } catch (err) {
        document.getElementById('rules-container').innerHTML = '<p class="text-danger">Failed to load rules</p>';
    }
}

function renderRules(rules, acked, total, complete) {
    if (!rules.length) {
        document.getElementById('rules-container').innerHTML = '<p class="text-ink-3">No rules to acknowledge at this time.</p>';
        document.getElementById('status-bar').classList.add('hidden');
        return;
    }
    const bar = document.getElementById('status-bar');
    bar.classList.remove('hidden');
    document.getElementById('status-text').textContent = acked + ' of ' + total + ' rules acknowledged';
    document.getElementById('status-badge').innerHTML = complete
        ? '<span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-ok/10 text-ok"><i class="fas fa-check mr-1"></i>All Complete</span>'
        : '<span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-warn/10 text-warn">' + (total - acked) + ' remaining</span>';

    document.getElementById('rules-container').innerHTML = rules.map((r, i) => {
        if (r.acknowledged) {
            return `<div class="bg-ok/10 border border-line rounded-2xl shadow-soft p-4 flex items-start">
                <span class="flex-shrink-0 w-8 h-8 rounded-full bg-ok/10 text-ok flex items-center justify-center text-sm font-bold mr-3">${i + 1}</span>
                <div class="flex-1">
                    <p class="text-sm text-ink">${esc(r.text)}</p>
                    <p class="text-xs text-ok mt-1"><i class="fas fa-check mr-1"></i>Initialed: <strong>${esc(r.initials)}</strong></p>
                </div>
            </div>`;
        } else {
            return `<div class="bg-surface border border-line rounded-2xl shadow-soft p-4 flex items-start" id="rule-${r.rule_id}">
                <span class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-100 text-primary-700 flex items-center justify-center text-sm font-bold mr-3">${i + 1}</span>
                <div class="flex-1">
                    <p class="text-sm text-ink mb-3">${esc(r.text)}</p>
                    <div class="flex items-center gap-2">
                        <input type="text" id="initials-${r.rule_id}" maxlength="5" placeholder="Your initials"
                               class="w-24 bg-surface border border-line-2 rounded-xl px-3 py-1.5 text-sm text-center uppercase focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
                        <button onclick="acknowledge(${r.rule_id})" class="inline-flex items-center px-4 py-2 rounded-xl text-sm font-bold text-white bg-primary-500 hover:bg-primary-600 shadow-sm">
                            Initial
                        </button>
                    </div>
                </div>
            </div>`;
        }
    }).join('');
}

async function acknowledge(ruleId) {
    const input = document.getElementById('initials-' + ruleId);
    const initials = input.value.trim();
    if (!initials) { input.focus(); return; }
    try {
        const res = await fetch('/api/rules/' + ruleId + '/acknowledge', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ student_id: studentId, initials: initials }),
        });
        if (res.ok) { loadRulesStatus(); } else { const d = await res.json(); toast(d.error || 'Error', false); }
    } catch (err) { toast('Network error', false); }
}

loadRulesStatus();
</script>
{% endblock %}
