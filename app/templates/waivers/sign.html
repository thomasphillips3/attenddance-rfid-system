{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <h1 class="font-display text-3xl text-ink leading-tight">Forms for {{ student.full_name }}</h1>
        <p class="text-sm text-ink-2 mt-1">Please review and sign each form below.</p>
    </div>

    <div id="msg" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>
    <div id="forms"><p class="text-ink-3">Loading…</p></div>
    <div class="mt-6">
        <a href="{{ url_for('main.parent_dashboard') if current_user.is_parent else url_for('main.student_detail', student_id=student.id) }}"
           class="text-sm text-primary-600 hover:underline">&larr; Back</a>
    </div>
</div>

<script>const STUDENT_ID = {{ student.id }};</script>
{% endblock %}

{% block extra_js %}
<script>
function msg(t, ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-xl text-sm font-medium '+(ok?'bg-ok/10 text-ok':'bg-danger/10 text-danger');m.classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'});setTimeout(()=>m.classList.add('hidden'),4000);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const editing = new Set();

async function load(){
    const el=document.getElementById('forms');
    const data=await (await fetch(`/api/students/${STUDENT_ID}/waivers`)).json();
    const w=data.waivers||[];
    if(!w.length){el.innerHTML='<div class="bg-surface border border-line rounded-2xl shadow-soft p-6 text-center text-ink-3">No forms to sign right now.</div>';return;}
    el.innerHTML=w.map(t=>{
        if(t.signed && !editing.has(t.id)){
            return `<div class="bg-surface border border-line rounded-2xl shadow-soft mb-4 overflow-hidden">
                <div class="px-5 py-3 border-b border-line flex items-center justify-between bg-ok/10">
                    <span class="font-bold text-ink">${esc(t.title)}</span>
                    <span class="text-sm ${t.consent?'text-ok':'text-ink-3'}">${t.consent?'✓ Signed':'Opted out'} by ${esc(t.signed_name)} · ${new Date(t.signed_at).toLocaleDateString()}</span>
                </div>
                <div class="px-5 py-2 text-right"><button onclick="reopen(${t.id})" class="text-xs text-primary-600 hover:underline">Update</button></div>
            </div>`;
        }
        return `<div class="bg-surface border border-line rounded-2xl shadow-soft mb-4 overflow-hidden" id="form-${t.id}">
            <div class="px-5 py-3 border-b border-line"><span class="font-bold text-ink">${esc(t.title)}</span></div>
            <div class="px-5 py-4">
                <div class="text-sm text-ink-2 whitespace-pre-wrap mb-4 max-h-60 overflow-y-auto border border-line rounded-xl p-3 bg-surface-2">${esc(t.body)}</div>
                <label class="block text-sm font-medium text-ink-2">Type your full name to sign</label>
                <input id="sig-${t.id}" placeholder="Your full name" class="mt-1 mb-3 block w-full bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
                <div class="flex flex-wrap gap-2">
                    <button onclick="sign(${t.id}, true)" class="px-4 py-2 rounded-xl bg-primary-500 text-white text-sm font-bold hover:bg-primary-600 shadow-sm">I agree &amp; sign</button>
                    ${t.allow_decline?`<button onclick="sign(${t.id}, false)" class="px-4 py-2 rounded-xl border border-line-2 text-ink-2 text-sm font-bold hover:bg-surface-2">Sign but opt out</button>`:''}
                </div>
            </div>
        </div>`;
    }).join('');
}

async function sign(tid, consent){
    const name=document.getElementById('sig-'+tid).value.trim();
    if(!name){msg('Type your name to sign',false);return;}
    const r=await fetch(`/api/students/${STUDENT_ID}/waivers/${tid}/sign`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signed_name:name,consent})});
    const d=await r.json();
    msg(r.ok?(consent?'Signed — thank you!':'Recorded your opt-out'):(d.error||'Error'),r.ok);
    if(r.ok){editing.delete(tid);load();}
}
function reopen(tid){ editing.add(tid); load(); }

load();
</script>
{% endblock %}
