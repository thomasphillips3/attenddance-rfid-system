{% extends "base.html" %}

{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-3xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <h1 class="text-2xl font-bold text-gray-900">Forms for {{ student.full_name }}</h1>
            <p class="mt-1 text-sm text-gray-600">Please review and sign each form below.</p>
        </div>
    </div>

    <div class="max-w-3xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="msg" class="hidden mb-4 p-3 rounded-md text-sm font-medium"></div>
        <div id="forms"><p class="text-gray-500">Loading…</p></div>
        <div class="mt-6">
            <a href="{{ url_for('main.parent_dashboard') if current_user.is_parent else url_for('main.student_detail', student_id=student.id) }}"
               class="text-sm text-primary-600 hover:underline">&larr; Back</a>
        </div>
    </div>
</div>

<script>const STUDENT_ID = {{ student.id }};</script>
{% endblock %}

{% block extra_js %}
<script>
function msg(t, ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-md text-sm font-medium '+(ok?'bg-green-100 text-green-800':'bg-red-100 text-red-800');m.classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'});setTimeout(()=>m.classList.add('hidden'),4000);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const editing = new Set();

async function load(){
    const el=document.getElementById('forms');
    const data=await (await fetch(`/api/students/${STUDENT_ID}/waivers`)).json();
    const w=data.waivers||[];
    if(!w.length){el.innerHTML='<div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">No forms to sign right now.</div>';return;}
    el.innerHTML=w.map(t=>{
        if(t.signed && !editing.has(t.id)){
            return `<div class="bg-white rounded-lg shadow mb-4 overflow-hidden">
                <div class="px-5 py-3 border-b flex items-center justify-between bg-green-50">
                    <span class="font-semibold text-gray-900">${esc(t.title)}</span>
                    <span class="text-sm ${t.consent?'text-green-700':'text-gray-500'}">${t.consent?'✓ Signed':'Opted out'} by ${esc(t.signed_name)} · ${new Date(t.signed_at).toLocaleDateString()}</span>
                </div>
                <div class="px-5 py-2 text-right"><button onclick="reopen(${t.id})" class="text-xs text-primary-600 hover:underline">Update</button></div>
            </div>`;
        }
        return `<div class="bg-white rounded-lg shadow mb-4 overflow-hidden" id="form-${t.id}">
            <div class="px-5 py-3 border-b"><span class="font-semibold text-gray-900">${esc(t.title)}</span></div>
            <div class="px-5 py-4">
                <div class="text-sm text-gray-700 whitespace-pre-wrap mb-4 max-h-60 overflow-y-auto border border-gray-100 rounded p-3 bg-gray-50">${esc(t.body)}</div>
                <label class="block text-sm font-medium text-gray-700">Type your full name to sign</label>
                <input id="sig-${t.id}" placeholder="Your full name" class="mt-1 mb-3 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                <div class="flex flex-wrap gap-2">
                    <button onclick="sign(${t.id}, true)" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700">I agree &amp; sign</button>
                    ${t.allow_decline?`<button onclick="sign(${t.id}, false)" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-50">Sign but opt out</button>`:''}
                </div>
            </div>
        </div>`;
    }).join('');
}

async function sign(tid, consent){
    const name=document.getElementById('sig-'+tid).value.trim();
    if(!name){msg('Type your name to sign',false);return;}
    const r=await fetch(`/api/students/${STUDENT_ID}/waivers/${tid}/sign`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signed_name:name,consent})});
    const d=await r.json();
    msg(r.ok?(consent?'Signed — thank you!':'Recorded your opt-out'):(d.error||'Error'),r.ok);
    if(r.ok){editing.delete(tid);load();}
}
function reopen(tid){ editing.add(tid); load(); }

load();
</script>
{% endblock %}
