{% extends "base.html" %}

{% block content %}
<div class="flex flex-wrap items-end justify-between gap-3 mb-6">
    <div>
        <div class="text-[11px] font-bold uppercase tracking-[.09em] text-primary-600">Studio</div>
        <h1 class="font-display text-3xl text-ink leading-tight mt-1"><i class="fas fa-file-signature text-primary-500 mr-2"></i>Forms &amp; Waivers</h1>
        <p class="text-sm text-ink-2 mt-1">Liability releases, photo consent, medical authorization — signed by parents per student</p>
    </div>
    <button onclick="createTemplate()" class="px-4 py-2 rounded-xl bg-primary-500 text-white text-sm font-bold hover:bg-primary-600 shadow-sm"><i class="fas fa-plus mr-2"></i>New Form</button>
</div>

<div id="msg" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>
<div id="forms-list" class="space-y-4"><p class="text-ink-3">Loading…</p></div>
{% endblock %}

{% block extra_js %}
<script>
function msg(t, ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-xl text-sm font-medium '+(ok?'bg-ok/10 text-ok':'bg-danger/10 text-danger');m.classList.remove('hidden');setTimeout(()=>m.classList.add('hidden'),4000);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function load(){
    const el=document.getElementById('forms-list');
    const data=await (await fetch('/api/waivers/compliance')).json();
    const comp=data.compliance||[];
    if(!comp.length){el.innerHTML='<p class="text-ink-3">No forms yet. Create a liability waiver, photo release, or medical authorization to get started.</p>';return;}
    el.innerHTML=comp.map(c=>{
        const pct = c.total ? Math.round(c.signed_count/c.total*100) : 0;
        return `<div class="bg-surface border border-line rounded-2xl shadow-soft overflow-hidden">
            <div class="px-5 py-3 border-b border-line flex items-center justify-between flex-wrap gap-2">
                <div><span class="font-bold text-ink">${esc(c.title)}</span>
                    ${c.allow_decline?'<span class="text-xs text-info ml-2">opt-out allowed</span>':''}
                    <p class="text-xs text-ink-3">${c.signed_count}/${c.total} students signed (${pct}%)</p></div>
                <div class="flex gap-3">
                    <button onclick="editTemplate(${c.id})" class="text-xs text-ink-2 hover:underline">Edit</button>
                    <button onclick="archiveTemplate(${c.id},'${esc(c.title)}')" class="text-xs text-danger hover:underline">Archive</button>
                </div>
            </div>
            <div class="px-5 py-3 text-sm">
                ${c.unsigned.length?`<div class="mb-2"><span class="font-bold text-warn">Not signed (${c.unsigned.length}):</span>
                    <span class="text-ink-2">${c.unsigned.map(u=>esc(u.student_name)).join(', ')}</span></div>`:'<div class="text-ok mb-2">✓ Everyone has signed.</div>'}
                ${c.declined.length?`<div><span class="font-bold text-danger">Opted out (${c.declined.length}):</span>
                    <span class="text-ink-2">${c.declined.map(d=>esc(d.student_name)).join(', ')}</span></div>`:''}
            </div>
        </div>`;
    }).join('');
}

async function createTemplate(){
    const title=prompt('Form title (e.g. Liability Waiver, Photo Release, Medical Authorization):');if(!title)return;
    const body=prompt('Form text the parent will read & agree to:');if(!body)return;
    const allow_decline=confirm('Allow parents to OPT OUT while still signing? (OK for photo release; Cancel for mandatory liability/medical)');
    const r=await fetch('/api/waivers/templates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body,allow_decline})});
    msg(r.ok?'Form created':'Error',r.ok);if(r.ok)load();
}
async function editTemplate(id){
    const t=(await (await fetch('/api/waivers/templates?all=1')).json()).templates.find(x=>x.id===id);
    const title=prompt('Title:',t.title);if(title===null)return;
    const body=prompt('Form text:',t.body);if(body===null)return;
    const r=await fetch(`/api/waivers/templates/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body})});
    msg(r.ok?'Saved':'Error',r.ok);if(r.ok)load();
}
async function archiveTemplate(id,title){if(!confirm(`Archive "${title}"? Existing signatures are kept.`))return;const r=await fetch(`/api/waivers/templates/${id}`,{method:'DELETE'});msg(r.ok?'Archived':'Error',r.ok);if(r.ok)load();}

load();
</script>
{% endblock %}
