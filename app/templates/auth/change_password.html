{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
    <h1 class="font-display text-3xl text-ink mb-6">Change Password</h1>
    <div class="bg-surface border border-line rounded-2xl shadow-soft p-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded-xl text-sm {% if category == 'error' %}bg-danger/10 text-danger{% else %}bg-ok/10 text-ok{% endif %}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.change_password') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-ink-2">Current Password</label>
                <input type="password" name="current_password" required class="mt-1 block w-full bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-ink-2">New Password</label>
                <input type="password" name="new_password" required minlength="6" class="mt-1 block w-full bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-ink-2">Confirm New Password</label>
                <input type="password" name="confirm_password" required minlength="6" class="mt-1 block w-full bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
            </div>
            <button type="submit" class="w-full px-4 py-2 rounded-xl bg-primary-500 text-white hover:bg-primary-600 text-sm font-bold shadow-sm">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
