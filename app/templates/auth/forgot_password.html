{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto py-10 px-4">
    <div class="text-center mb-6">
        <div class="text-[11px] font-bold uppercase tracking-[.12em] text-primary-600">LSO Dance</div>
        <h1 class="font-display text-3xl text-ink mt-1">Reset your password</h1>
        <p class="text-sm text-ink-2 mt-1">Enter your email and we'll send you a reset link.</p>
    </div>
    {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, m in msgs %}
        <div class="mb-4 p-3 rounded-xl text-sm font-medium {{ 'bg-ok/10 text-ok' if cat in ['success', 'info'] else 'bg-danger/10 text-danger' }}">{{ m }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST" class="bg-surface border border-line rounded-2xl shadow-soft p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-ink-2 mb-1" for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus
                   class="block w-full bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
        </div>
        <button type="submit" class="w-full px-4 py-2 rounded-xl bg-primary-500 text-white text-sm font-bold hover:bg-primary-600 shadow-sm">Send reset link</button>
        <p class="text-center text-sm"><a href="{{ url_for('auth.login') }}" class="text-primary-600 hover:underline">Back to sign in</a></p>
    </form>
</div>
{% endblock %}
