{% extends "base.html" %}
{% block content %}
<div class="flex flex-wrap items-end justify-between gap-3 mb-6">
    <div>
        <div class="text-[11px] font-bold uppercase tracking-[.09em] text-primary-600">Studio</div>
        <h1 class="font-display text-3xl text-ink leading-tight mt-1"><i class="fas fa-user-plus text-primary-500 mr-2"></i>Enrollment Requests</h1>
        <p class="text-sm text-ink-2 mt-1">Review families who registered through your public sign-up link</p>
    </div>
    <div class="flex items-center gap-3">
        <a href="{{ url_for('main.public_register', _external=True) }}" target="_blank" class="text-sm text-primary-600 hover:underline"><i class="fas fa-external-link-alt mr-1"></i>Public link</a>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="reg-open" class="sr-only peer" onchange="toggleOpen()">
            <div class="w-11 h-6 bg-surface-2 peer-focus:ring-4 peer-focus:ring-primary-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-600"></div>
            <span class="ml-2 text-sm text-ink-2">Registration open</span>
        </label>
    </div>
</div>

<div id="msg" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>
<div class="mb-4">
    <select id="status-filter" onchange="load(1)" class="bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
        <option value="pending">Pending</option><option value="approved">Approved</option>
        <option value="rejected">Rejected</option><option value="all">All</option>
    </select>
</div>
<div id="list" class="space-y-4"><p class="text-ink-3">Loading…</p></div>
<div id="reg-pagination" class="flex items-center justify-between gap-3 mt-4"></div>
{% endblock %}

{% block extra_js %}
<script>
function msg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-xl text-sm font-medium '+(ok?'bg-ok/10 text-ok':'bg-danger/10 text-danger');m.classList.remove('hidden');setTimeout(()=>m.classList.add('hidden'),4000);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function loadToggle(){
    const s = (await (await fetch('/api/settings/payments')).json()).settings;
    document.getElementById('reg-open').checked = s.registration_open === '1';
}
async function toggleOpen(){
    const open = document.getElementById('reg-open').checked;
    const r = await fetch('/api/settings/payments',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({registration_open: open?'1':'0'})});
    msg(r.ok?('Registration '+(open?'opened':'closed')):'Error', r.ok);
}

let regPage=1;
async function load(page){
    if(page)regPage=page;
    const status=document.getElementById('status-filter').value;
    const el=document.getElementById('list');
    const data=await (await fetch('/api/registrations?status='+status+'&page='+regPage)).json();
    const rows=data.registrations||[];
    renderRegPagination(data.pagination);
    if(!rows.length){el.innerHTML='<p class="text-ink-3">Nothing here.</p>';return;}
    const badge=s=>({pending:'bg-warn/10 text-warn',approved:'bg-ok/10 text-ok',rejected:'bg-surface-2 text-ink-2'}[s]||'');
    el.innerHTML=rows.map(r=>`
        <div class="bg-surface border border-line rounded-2xl shadow-soft p-5">
            <div class="flex items-start justify-between flex-wrap gap-2">
                <div>
                    <span class="font-bold text-ink">${esc(r.parent_name)}</span>
                    <span class="px-2.5 py-1 rounded-full text-xs font-bold ml-2 ${badge(r.status)}">${r.status}</span>
                    <p class="text-sm text-ink-3">${esc(r.parent_email)}${r.parent_phone?' · '+esc(r.parent_phone):''} · ${new Date(r.created_at).toLocaleDateString()}</p>
                </div>
                ${r.status==='pending'?`<div class="flex gap-2">
                    <button onclick="approve(${r.id})" class="px-4 py-2 rounded-xl bg-ok text-white text-sm font-bold hover:opacity-90 shadow-sm">Approve</button>
                    <button onclick="reject(${r.id})" class="px-4 py-2 rounded-xl border border-line-2 text-ink-2 text-sm font-bold hover:bg-surface-2">Reject</button>
                </div>`:''}
            </div>
            <div class="mt-3 text-sm">
                <span class="font-bold text-ink-2">Dancers:</span>
                ${(r.students||[]).map(s=>`<span class="inline-block bg-surface-2 text-ink-2 rounded-full px-2.5 py-1 mr-1 mb-1">${esc(s.first_name)} ${esc(s.last_name||'')}${s.dob?' ('+esc(s.dob)+')':''}${s.allergies?' · ⚠ '+esc(s.allergies):''}</span>`).join('')}
            </div>
            ${(r.class_names||[]).length?`<div class="mt-1 text-sm"><span class="font-bold text-ink-2">Classes:</span> ${r.class_names.map(esc).join(', ')}</div>`:''}
            ${r.note?`<div class="mt-1 text-xs text-ink-3">"${esc(r.note)}"</div>`:''}
        </div>`).join('');
}
function renderRegPagination(p){
    const el=document.getElementById('reg-pagination');
    if(!el)return;
    if(!p||p.pages<=1){el.innerHTML='';return;}
    const start=(p.page-1)*p.per_page+1, end=Math.min(p.page*p.per_page,p.total);
    const btn='px-3 py-1.5 rounded-lg border border-line-2 text-sm font-bold text-ink-2 hover:border-primary-300 disabled:opacity-40 disabled:cursor-not-allowed';
    el.innerHTML=`<span class="text-sm text-ink-3">Showing ${start}–${end} of ${p.total}</span>
        <div class="flex items-center gap-2">
            <button class="${btn}" ${p.page<=1?'disabled':''} onclick="load(${p.page-1})">Prev</button>
            <span class="px-1 text-sm text-ink-2">Page ${p.page} of ${p.pages}</span>
            <button class="${btn}" ${p.page>=p.pages?'disabled':''} onclick="load(${p.page+1})">Next</button>
        </div>`;
}
async function approve(id){if(!confirm('Approve and create these dancers + a family account?'))return;const r=await fetch(`/api/registrations/${id}/approve`,{method:'POST'});const d=await r.json();msg(r.ok?d.message:d.error,r.ok);if(r.ok)load();}
async function reject(id){if(!confirm('Reject this registration?'))return;const r=await fetch(`/api/registrations/${id}/reject`,{method:'POST'});if(r.ok){msg('Rejected',true);load();}}
loadToggle(); load();
</script>
{% endblock %}
