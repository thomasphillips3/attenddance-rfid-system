<!DOCTYPE html>
<html lang="en" class="h-full bg-canvas">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8f2db5">
    <title>Register — LaShelle's School of Dance</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{
        colors:{primary:{50:'#faf2fd',100:'#f0ddf8',200:'#e0bcef',300:'#c98fe2',400:'#ad5ccf',500:'#8f2db5',600:'#7c249f',700:'#6b228a',800:'#531a6c',900:'#3d1252'},
                canvas:'#f7f3ee',surface:{DEFAULT:'#ffffff',2:'#fbf8f4'},ink:{DEFAULT:'#1f1a17',2:'#5a534c',3:'#8a827a'},line:{DEFAULT:'#ece6dd',2:'#d9d2c5'},ok:'#1f8a4c'},
        fontFamily:{display:['"DM Serif Display"','Georgia','serif'],sans:['"Atkinson Hyperlegible"','system-ui','sans-serif']}
    }}}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body{font-family:'Atkinson Hyperlegible',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.font-display{font-family:'DM Serif Display',Georgia,serif}</style>
</head>
<body class="min-h-full">
    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="text-center mb-8">
            <span class="inline-flex w-14 h-14 rounded-2xl bg-primary-500 text-white items-center justify-center text-2xl"><i class="fas fa-shoe-prints"></i></span>
            <h1 class="font-display text-3xl text-ink mt-3">LaShelle's School of Dance</h1>
            <p class="text-ink-2">Registration</p>
        </div>

        <div id="closed" class="hidden bg-surface border border-line rounded-2xl shadow-soft p-8 text-center text-ink-2">
            <i class="fas fa-door-closed text-3xl text-ink-3 mb-3"></i>
            <p class="text-lg font-medium">Registration is currently closed.</p>
            <p class="text-sm mt-2">Please check back soon or contact the studio.</p>
        </div>

        <div id="done" class="hidden bg-surface border border-line rounded-2xl shadow-soft p-8 text-center">
            <i class="fas fa-circle-check text-4xl text-green-500 mb-3"></i>
            <p id="done-msg" class="text-lg text-ink"></p>
        </div>

        <form id="reg-form" class="hidden bg-surface border border-line rounded-2xl shadow-soft p-6 space-y-5">
            <p id="welcome" class="text-sm text-ink-2"></p>

            <div>
                <h2 class="text-sm font-semibold text-ink-2 uppercase tracking-wider mb-2">Parent / Guardian</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <input id="p-name" placeholder="Your full name *" class="border border-line-2 rounded-md px-3 py-2 text-sm">
                    <input id="p-email" type="email" placeholder="Email *" class="border border-line-2 rounded-md px-3 py-2 text-sm">
                    <input id="p-phone" placeholder="Phone" class="border border-line-2 rounded-md px-3 py-2 text-sm sm:col-span-2">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-ink-2 uppercase tracking-wider">Dancer(s)</h2>
                    <button type="button" onclick="addStudent()" class="text-xs text-primary-600 hover:underline"><i class="fas fa-plus mr-1"></i>Add dancer</button>
                </div>
                <div id="students"></div>
            </div>

            <div id="class-section">
                <h2 class="text-sm font-semibold text-ink-2 uppercase tracking-wider mb-2">Classes of interest (optional)</h2>
                <div id="classes" class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm"></div>
            </div>

            <div>
                <label class="block text-sm font-medium text-ink-2">Anything else?</label>
                <textarea id="note" rows="2" class="mt-1 block w-full border border-line-2 rounded-md px-3 py-2 text-sm"></textarea>
            </div>

            <div id="err" class="hidden text-sm text-red-600"></div>
            <button type="submit" class="w-full px-4 py-3 bg-primary-600 text-white rounded-md font-medium hover:bg-primary-700">Submit Registration</button>
        </form>
    </div>

<script>
let studentIdx = 0;
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function addStudent(){
    studentIdx++;
    const div = document.createElement('div');
    div.className = 'border border-line rounded-md p-3 mb-2';
    div.dataset.idx = studentIdx;
    div.innerHTML = `
        <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-medium text-ink-3">Dancer ${studentIdx}</span>
            ${studentIdx > 1 ? `<button type="button" onclick="this.closest('[data-idx]').remove()" class="text-xs text-red-500">Remove</button>` : ''}
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <input class="s-first border border-line-2 rounded px-2 py-1.5 text-sm" placeholder="First name *">
            <input class="s-last border border-line-2 rounded px-2 py-1.5 text-sm" placeholder="Last name">
            <label class="text-xs text-ink-3">Date of birth<input type="date" class="s-dob border border-line-2 rounded px-2 py-1.5 text-sm w-full"></label>
            <input class="s-allergies border border-line-2 rounded px-2 py-1.5 text-sm" placeholder="Allergies / notes">
        </div>`;
    document.getElementById('students').appendChild(div);
}

async function init(){
    try {
        const info = await (await fetch('/api/registration/open')).json();
        if (!info.open){ document.getElementById('closed').classList.remove('hidden'); return; }
        document.getElementById('reg-form').classList.remove('hidden');
        document.getElementById('welcome').textContent = info.message;
        const cl = document.getElementById('classes');
        if ((info.classes||[]).length){
            cl.innerHTML = info.classes.map(c=>`<label class="flex items-center ${c.full?'opacity-50':''}">
                <input type="checkbox" class="c-box mr-2" value="${c.id}" ${c.full?'disabled':''}>
                ${esc(c.name)} <span class="text-ink-3 ml-1">(${esc(c.day_name)} ${esc(c.start_time)})${c.full?' — full':''}</span></label>`).join('');
        } else { document.getElementById('class-section').classList.add('hidden'); }
        addStudent();
    } catch { document.getElementById('closed').classList.remove('hidden'); }
}

document.getElementById('reg-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const err = document.getElementById('err'); err.classList.add('hidden');
    const students = [...document.querySelectorAll('#students [data-idx]')].map(d=>({
        first_name: d.querySelector('.s-first').value.trim(),
        last_name: d.querySelector('.s-last').value.trim(),
        dob: d.querySelector('.s-dob').value,
        allergies: d.querySelector('.s-allergies').value.trim(),
    })).filter(s=>s.first_name);
    const body = {
        parent_name: document.getElementById('p-name').value.trim(),
        parent_email: document.getElementById('p-email').value.trim(),
        parent_phone: document.getElementById('p-phone').value.trim(),
        students,
        class_ids: [...document.querySelectorAll('.c-box:checked')].map(b=>b.value),
        note: document.getElementById('note').value.trim(),
    };
    if (!body.parent_name || !body.parent_email){ err.textContent='Please enter your name and email.'; err.classList.remove('hidden'); return; }
    if (!students.length){ err.textContent='Please add at least one dancer.'; err.classList.remove('hidden'); return; }
    try {
        const res = await fetch('/api/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
        const d = await res.json();
        if (res.ok){ document.getElementById('reg-form').classList.add('hidden'); document.getElementById('done').classList.remove('hidden'); document.getElementById('done-msg').textContent = d.message; }
        else { err.textContent = d.error || 'Something went wrong.'; err.classList.remove('hidden'); }
    } catch { err.textContent='Network error. Please try again.'; err.classList.remove('hidden'); }
});

init();
</script>
</body>
</html>
