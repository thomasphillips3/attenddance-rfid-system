{% extends "base.html" %}
{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex items-center justify-between flex-wrap gap-3">
            <div>
                <h1 class="text-3xl font-bold text-gray-900"><i class="fas fa-rotate text-primary-500 mr-2"></i>Makeup Classes</h1>
                <p class="mt-1 text-sm text-gray-600">Track missed classes and the sessions making them up</p>
            </div>
            <button onclick="createMakeup()" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700"><i class="fas fa-plus mr-2"></i>Log Makeup</button>
        </div>
    </div>
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="msg" class="hidden mb-4 p-3 rounded-md text-sm font-medium"></div>
        <div class="mb-4">
            <select id="filter" onchange="load()" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="">All</option><option value="requested">Requested</option>
                <option value="scheduled">Scheduled</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option>
            </select>
        </div>
        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50"><tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Dancer</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Missed</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Makeup</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                </tr></thead>
                <tbody id="tbl" class="bg-white divide-y divide-gray-100"><tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Loading…</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const STUDENTS=[{% for s in students %}{id:{{s.id}},name:"{{s.full_name|e}}"},{% endfor %}];
const CLASSES=[{% for c in classes %}{id:{{c.id}},name:"{{c.name|e}}"},{% endfor %}];
function msg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-md text-sm font-medium '+(ok?'bg-green-100 text-green-800':'bg-red-100 text-red-800');m.classList.remove('hidden');setTimeout(()=>m.classList.add('hidden'),3500);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function classOptions(){return CLASSES.map(c=>`${c.id}. ${c.name}`).join('\n');}

async function load(){
    const status=document.getElementById('filter').value;
    const data=await (await fetch('/api/makeups'+(status?'?status='+status:''))).json();
    const rows=data.makeups||[];const tb=document.getElementById('tbl');
    if(!rows.length){tb.innerHTML='<tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Nothing here.</td></tr>';return;}
    const badge=s=>({requested:'bg-amber-100 text-amber-800',scheduled:'bg-blue-100 text-blue-800',completed:'bg-green-100 text-green-800',cancelled:'bg-gray-200 text-gray-600'}[s]||'');
    tb.innerHTML=rows.map(m=>`<tr>
        <td class="px-4 py-3 text-sm font-medium">${esc(m.student_name)}</td>
        <td class="px-4 py-3 text-sm text-gray-600">${esc(m.missed_class||'—')}${m.missed_date?'<div class="text-xs text-gray-400">'+m.missed_date+'</div>':''}</td>
        <td class="px-4 py-3 text-sm text-gray-600">${esc(m.makeup_class||'—')}${m.makeup_date?'<div class="text-xs text-gray-400">'+m.makeup_date+'</div>':''}</td>
        <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs ${badge(m.status)}">${m.status}</span></td>
        <td class="px-4 py-3 text-sm text-right">
            ${m.status!=='completed'?`<button onclick="setStatus(${m.id},'completed')" class="text-xs text-green-600 hover:underline mr-2">Complete</button>`:''}
            ${m.status==='requested'?`<button onclick="schedule(${m.id})" class="text-xs text-blue-600 hover:underline mr-2">Schedule</button>`:''}
            <button onclick="del(${m.id})" class="text-xs text-red-600 hover:underline">Delete</button>
        </td></tr>`).join('');
}
async function createMakeup(){
    const slist=STUDENTS.map(s=>`${s.id}. ${s.name}`).join('\n');
    const sid=prompt(`Dancer? Enter ID:\n${slist}`);if(!STUDENTS.find(s=>s.id==sid))return;
    const missed=prompt(`Missed class? Enter class ID (optional):\n${classOptions()}`)||'';
    const missed_date=prompt('Missed date (YYYY-MM-DD, optional):')||'';
    const makeup=prompt(`Makeup class? Enter class ID (optional):\n${classOptions()}`)||'';
    const makeup_date=prompt('Makeup date (YYYY-MM-DD, optional):')||'';
    const r=await fetch('/api/makeups',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,missed_class_id:missed,missed_date,makeup_class_id:makeup,makeup_date})});
    msg(r.ok?'Makeup logged':'Error',r.ok);if(r.ok)load();
}
async function schedule(id){const makeup=prompt(`Makeup class ID:\n${classOptions()}`)||'';const makeup_date=prompt('Makeup date (YYYY-MM-DD):')||'';const r=await fetch(`/api/makeups/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'scheduled',makeup_class_id:makeup,makeup_date})});if(r.ok)load();}
async function setStatus(id,status){const r=await fetch(`/api/makeups/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});if(r.ok)load();}
async function del(id){if(!confirm('Delete this makeup record?'))return;const r=await fetch(`/api/makeups/${id}`,{method:'DELETE'});if(r.ok)load();}
load();
</script>
{% endblock %}
