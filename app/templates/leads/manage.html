{% extends "base.html" %}
{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex items-center justify-between flex-wrap gap-3">
            <div>
                <h1 class="text-3xl font-bold text-gray-900"><i class="fas fa-user-tag text-primary-500 mr-2"></i>Leads &amp; Trials</h1>
                <p class="mt-1 text-sm text-gray-600">Track prospective families from first contact to enrolled</p>
            </div>
            <button onclick="createLead()" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700"><i class="fas fa-plus mr-2"></i>New Lead</button>
        </div>
    </div>
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="msg" class="hidden mb-4 p-3 rounded-md text-sm font-medium"></div>
        <div class="mb-4">
            <select id="filter" onchange="load()" class="border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="all">All</option><option value="new" selected>New</option><option value="contacted">Contacted</option>
                <option value="trial_scheduled">Trial scheduled</option><option value="converted">Converted</option><option value="lost">Lost</option>
            </select>
        </div>
        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50"><tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Contact</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Interest</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                </tr></thead>
                <tbody id="tbl" class="bg-white divide-y divide-gray-100"><tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Loading…</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const STATUSES=['new','contacted','trial_scheduled','converted','lost'];
function msg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-md text-sm font-medium '+(ok?'bg-green-100 text-green-800':'bg-red-100 text-red-800');m.classList.remove('hidden');setTimeout(()=>m.classList.add('hidden'),3500);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function load(){
    const status=document.getElementById('filter').value;
    const data=await (await fetch('/api/leads?status='+status)).json();
    const rows=data.leads||[];const tb=document.getElementById('tbl');
    if(!rows.length){tb.innerHTML='<tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">No leads here.</td></tr>';return;}
    const badge=s=>({new:'bg-blue-100 text-blue-800',contacted:'bg-indigo-100 text-indigo-800',trial_scheduled:'bg-amber-100 text-amber-800',converted:'bg-green-100 text-green-800',lost:'bg-gray-200 text-gray-600'}[s]||'');
    tb.innerHTML=rows.map(l=>`<tr>
        <td class="px-4 py-3 text-sm font-medium">${esc(l.name)}${l.note?`<div class="text-xs text-gray-400">${esc(l.note)}</div>`:''}</td>
        <td class="px-4 py-3 text-sm text-gray-600">${esc(l.email||'')}${l.phone?'<div class="text-xs text-gray-400">'+esc(l.phone)+'</div>':''}</td>
        <td class="px-4 py-3 text-sm text-gray-600">${esc(l.interest||'—')}${l.trial_date?'<div class="text-xs text-amber-600">trial '+l.trial_date+'</div>':''}</td>
        <td class="px-4 py-3">
            <select onchange="setStatus(${l.id},this.value)" class="text-xs border border-gray-200 rounded px-1 py-0.5 ${badge(l.status)}">
                ${STATUSES.map(s=>`<option value="${s}" ${s===l.status?'selected':''}>${s.replace('_',' ')}</option>`).join('')}
            </select>
        </td>
        <td class="px-4 py-3 text-sm text-right">
            ${l.status!=='converted'?`<button onclick="convert(${l.id})" class="text-xs text-green-600 hover:underline mr-2">Convert</button>`:''}
            <button onclick="del(${l.id})" class="text-xs text-red-600 hover:underline">Delete</button>
        </td></tr>`).join('');
}
async function createLead(){
    const name=prompt('Lead name:');if(!name)return;
    const email=prompt('Email (optional):')||'';
    const phone=prompt('Phone (optional):')||'';
    const interest=prompt('Interested in (class/style/age, optional):')||'';
    const source=prompt('Source (instagram, referral, walk-in...):')||'';
    const r=await fetch('/api/leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,interest,source})});
    msg(r.ok?'Lead added':'Error',r.ok);if(r.ok)load();
}
async function setStatus(id,status){const r=await fetch(`/api/leads/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});if(r.ok)load();}
async function convert(id){if(!confirm('Convert this lead into a family + dancer?'))return;const r=await fetch(`/api/leads/${id}/convert`,{method:'POST'});const d=await r.json();msg(r.ok?d.message:d.error,r.ok);if(r.ok)load();}
async function del(id){if(!confirm('Delete this lead?'))return;const r=await fetch(`/api/leads/${id}`,{method:'DELETE'});if(r.ok)load();}
load();
</script>
{% endblock %}
