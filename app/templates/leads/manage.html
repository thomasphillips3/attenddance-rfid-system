{% extends "base.html" %}
{% block content %}
<div class="flex flex-wrap items-end justify-between gap-3 mb-6">
    <div>
        <p class="text-[11px] font-bold uppercase tracking-[.12em] text-ink-3">People</p>
        <h1 class="font-display text-3xl text-ink leading-tight mt-1">Leads &amp; Trials</h1>
        <p class="mt-1 text-sm text-ink-3">Track prospective families from first contact to enrolled</p>
    </div>
    <button onclick="createLead()" class="px-4 py-2 rounded-xl bg-primary-500 text-white text-sm font-bold hover:bg-primary-600 shadow-sm"><i class="fas fa-plus mr-2"></i>New Lead</button>
</div>
<div id="msg" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>
<div class="mb-4">
    <select id="filter" onchange="load()" class="bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
        <option value="all">All</option><option value="new" selected>New</option><option value="contacted">Contacted</option>
        <option value="trial_scheduled">Trial scheduled</option><option value="converted">Converted</option><option value="lost">Lost</option>
    </select>
</div>
<div class="bg-surface border border-line rounded-2xl shadow-soft overflow-hidden">
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead class="bg-surface-2 border-b border-line"><tr>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Name</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Contact</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Interest</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Status</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-right">Action</th>
            </tr></thead>
            <tbody id="tbl"><tr><td colspan="5" class="px-5 py-6 text-center text-ink-3">Loading…</td></tr></tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const STATUSES=['new','contacted','trial_scheduled','converted','lost'];
function msg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-xl text-sm font-medium '+(ok?'bg-ok/10 text-ok':'bg-danger/10 text-danger');m.classList.remove('hidden');setTimeout(()=>m.classList.add('hidden'),3500);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function load(){
    const status=document.getElementById('filter').value;
    const data=await (await fetch('/api/leads?status='+status)).json();
    const rows=data.leads||[];const tb=document.getElementById('tbl');
    if(!rows.length){tb.innerHTML='<tr><td colspan="5" class="px-5 py-6 text-center text-ink-3">No leads here.</td></tr>';return;}
    const badge=s=>({new:'bg-info/10 text-info',contacted:'bg-warn/10 text-warn',trial_scheduled:'bg-primary-50 text-primary-700',converted:'bg-ok/10 text-ok',lost:'bg-surface-2 text-ink-2'}[s]||'bg-surface-2 text-ink-2');
    tb.innerHTML=rows.map(l=>`<tr class="border-b border-line last:border-0">
        <td class="px-5 py-3 text-sm font-bold text-ink">${esc(l.name)}${l.note?`<div class="text-xs text-ink-3 font-normal">${esc(l.note)}</div>`:''}</td>
        <td class="px-5 py-3 text-sm text-ink-2">${esc(l.email||'')}${l.phone?'<div class="text-xs text-ink-3">'+esc(l.phone)+'</div>':''}</td>
        <td class="px-5 py-3 text-sm text-ink-2">${esc(l.interest||'—')}${l.trial_date?'<div class="text-xs text-warn tabular-nums">trial '+l.trial_date+'</div>':''}</td>
        <td class="px-5 py-3">
            <select onchange="setStatus(${l.id},this.value)" class="text-xs font-bold border border-line-2 rounded-full px-2.5 py-1 ${badge(l.status)}">
                ${STATUSES.map(s=>`<option value="${s}" ${s===l.status?'selected':''}>${s.replace('_',' ')}</option>`).join('')}
            </select>
        </td>
        <td class="px-5 py-3 text-sm text-right">
            ${l.status!=='converted'?`<button onclick="convert(${l.id})" class="text-xs text-ok hover:underline mr-2">Convert</button>`:''}
            <button onclick="del(${l.id})" class="text-xs text-danger hover:underline">Delete</button>
        </td></tr>`).join('');
}
async function createLead(){
    const name=prompt('Lead name:');if(!name)return;
    const email=prompt('Email (optional):')||'';
    const phone=prompt('Phone (optional):')||'';
    const interest=prompt('Interested in (class/style/age, optional):')||'';
    const source=prompt('Source (instagram, referral, walk-in...):')||'';
    const r=await fetch('/api/leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,interest,source})});
    msg(r.ok?'Lead added':'Error',r.ok);if(r.ok)load();
}
async function setStatus(id,status){const r=await fetch(`/api/leads/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});if(r.ok)load();}
async function convert(id){if(!confirm('Convert this lead into a family + dancer?'))return;const r=await fetch(`/api/leads/${id}/convert`,{method:'POST'});const d=await r.json();msg(r.ok?d.message:d.error,r.ok);if(r.ok)load();}
async function del(id){if(!confirm('Delete this lead?'))return;const r=await fetch(`/api/leads/${id}`,{method:'DELETE'});if(r.ok)load();}
load();
</script>
{% endblock %}
