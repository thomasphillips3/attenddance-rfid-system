{% extends "base.html" %}
{% block content %}
<div class="flex flex-wrap items-end justify-between gap-3 mb-6">
    <div>
        <div class="text-[11px] font-bold uppercase tracking-[.09em] text-primary-600">Money</div>
        <h1 class="font-display text-3xl text-ink leading-tight mt-1"><i class="fas fa-hand-holding-heart text-primary-500 mr-2"></i>Donations</h1>
        <p class="mt-1 text-sm text-ink-2">Foundation gifts &amp; year-end giving statements</p>
    </div>
    <button onclick="recordDonation()" class="px-4 py-2 rounded-xl bg-primary-500 text-white text-sm font-bold hover:bg-primary-600 shadow-sm"><i class="fas fa-plus mr-2"></i>Record Donation</button>
</div>

<div id="msg" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>
<div class="bg-surface border border-line rounded-2xl shadow-soft p-4 mb-6 flex items-center justify-between flex-wrap gap-3">
    <div class="text-sm text-ink-2">Recorded total: <span id="rec-total" class="font-bold text-ink">$0.00</span></div>
    <div class="flex items-center gap-2">
        <input id="gs-email" placeholder="donor email" class="bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
        <input id="gs-year" type="number" value="2026" class="bg-surface border border-line-2 rounded-xl px-3 py-2 text-sm w-24 focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
        <button onclick="openGiving()" class="px-4 py-2 rounded-xl bg-primary-500 text-white text-sm font-bold hover:bg-primary-600 shadow-sm">Giving statement</button>
    </div>
</div>
<div class="bg-surface border border-line rounded-2xl shadow-soft overflow-hidden">
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
            <thead class="bg-surface-2 border-b border-line"><tr>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Date</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Donor</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-right">Amount</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Method</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-left">Status</th>
                <th class="text-[11px] font-bold uppercase tracking-[.06em] text-ink-3 px-5 py-3 text-right">Action</th>
            </tr></thead>
            <tbody id="don-table"><tr><td colspan="6" class="px-5 py-6 text-center text-ink-3">Loading…</td></tr></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function msg(t,ok){const m=document.getElementById('msg');m.textContent=t;m.className='mb-4 p-3 rounded-xl text-sm font-medium '+(ok?'bg-ok/10 text-ok':'bg-danger/10 text-danger');m.classList.remove('hidden');setTimeout(()=>m.classList.add('hidden'),4000);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function load(){
    const data=await (await fetch('/api/donations')).json();
    document.getElementById('rec-total').textContent='$'+(data.recorded_total||'0.00');
    const rows=data.donations||[];
    const tb=document.getElementById('don-table');
    if(!rows.length){tb.innerHTML='<tr><td colspan="6" class="px-5 py-6 text-center text-ink-3">No donations yet.</td></tr>';return;}
    const badge=s=>({recorded:'bg-ok/10 text-ok',pending:'bg-warn/10 text-warn',rejected:'bg-surface-2 text-ink-2'}[s]||'');
    tb.innerHTML=rows.map(d=>`<tr class="border-b border-line last:border-0">
        <td class="px-5 py-3 text-sm">${new Date(d.donation_date+'T00:00').toLocaleDateString()}</td>
        <td class="px-5 py-3 text-sm">${esc(d.donor_name||'—')}<div class="text-xs text-ink-3">${esc(d.donor_email||'')}</div></td>
        <td class="px-5 py-3 text-sm text-right font-semibold">$${d.amount}</td>
        <td class="px-5 py-3 text-sm capitalize">${esc(d.method||'—')}</td>
        <td class="px-5 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-bold ${badge(d.status)}">${d.status}</span></td>
        <td class="px-5 py-3 text-sm text-right">
            ${d.status==='pending'?`<button onclick="confirmDon(${d.id})" class="text-xs text-ok hover:underline mr-2">Confirm</button>`:''}
            <button onclick="delDon(${d.id})" class="text-xs text-danger hover:underline">Delete</button>
        </td></tr>`).join('');
}
async function recordDonation(){
    const donor_name=prompt('Donor name:')||'';
    const donor_email=prompt('Donor email (for giving statement):')||'';
    const amount=prompt('Amount ($):');if(!amount)return;
    const method=prompt('Method (cash, check, zelle, cashapp, square, other):')||'';
    const r=await fetch('/api/donations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({donor_name,donor_email,amount,method})});
    const d=await r.json();msg(r.ok?'Recorded':d.error,r.ok);if(r.ok)load();
}
async function confirmDon(id){const r=await fetch(`/api/donations/${id}/confirm`,{method:'POST'});if(r.ok)load();}
async function delDon(id){if(!confirm('Delete this donation?'))return;const r=await fetch(`/api/donations/${id}`,{method:'DELETE'});if(r.ok)load();}
function openGiving(){const email=document.getElementById('gs-email').value.trim();const year=document.getElementById('gs-year').value;if(!email){msg('Enter a donor email',false);return;}window.open(`/giving-statement?email=${encodeURIComponent(email)}&year=${year}`,'_blank');}
load();
</script>
{% endblock %}
