{% extends "base.html" %}

{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Classes</h1>
                    <p class="mt-1 text-sm text-gray-600">Manage your dance class schedule</p>
                </div>
                <button onclick="openAddModal()" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">
                    <i class="fas fa-calendar-plus mr-2"></i>Add Class
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="classes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 col-span-full text-center py-8">Loading classes...</p>
        </div>
    </div>
</div>

<div id="class-modal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeModal()"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
            <h3 id="modal-title" class="text-lg font-medium text-gray-900 mb-4">Add Class</h3>
            <form id="class-form" onsubmit="saveClass(event)">
                <input type="hidden" id="class-id">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Class Name *</label>
                        <input type="text" id="class-name" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-primary-500 focus:border-primary-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Day *</label>
                            <select id="day-of-week" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                                <option value="0">Monday</option><option value="1">Tuesday</option><option value="2">Wednesday</option><option value="3">Thursday</option><option value="4">Friday</option><option value="5">Saturday</option><option value="6">Sunday</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Level</label>
                            <select id="level" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                                <option value="">Any</option><option value="Beginner">Beginner</option><option value="Intermediate">Intermediate</option><option value="Advanced">Advanced</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Start Time *</label>
                            <input type="time" id="start-time" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">End Time *</label>
                            <input type="time" id="end-time" required class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Max Students</label>
                        <input type="number" id="max-students" value="20" min="1" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Enrollment Modal -->
<div id="enroll-modal" class="fixed inset-0 z-50 hidden overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75" onclick="closeEnrollModal()"></div>
        <div class="relative bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 id="enroll-modal-title" class="text-lg font-medium text-gray-900">Manage Students</h3>
                <button onclick="closeEnrollModal()" class="text-gray-400 hover:text-gray-500"><i class="fas fa-times"></i></button>
            </div>
            <!-- Add students (batch) -->
            <div id="add-students-section" class="mb-4 hidden">
                <div class="border border-gray-200 rounded-md max-h-48 overflow-y-auto p-2" id="student-checklist">
                    <p class="text-gray-500 text-sm">Loading...</p>
                </div>
                <div class="flex justify-end mt-2 space-x-2">
                    <button onclick="toggleAddSection(false)" class="px-3 py-1.5 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button onclick="enrollSelected()" class="px-3 py-1.5 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700">Enroll Selected</button>
                </div>
            </div>
            <div id="add-btn-row" class="mb-4">
                <button onclick="toggleAddSection(true)" class="w-full inline-flex justify-center items-center px-3 py-2 border border-dashed border-gray-300 rounded-md text-sm text-gray-600 hover:border-primary-400 hover:text-primary-600">
                    <i class="fas fa-plus mr-2"></i>Add Students
                </button>
            </div>
            <!-- Enrolled students list -->
            <div id="enrolled-students" class="space-y-2">
                <p class="text-gray-500 text-sm">Loading...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function loadClasses() {
    try {
        const res = await fetch('/api/classes');
        const data = await res.json();
        renderClasses(data.classes);
    } catch (err) {
        document.getElementById('classes-container').innerHTML = '<p class="text-red-500 col-span-full text-center py-8">Failed to load classes</p>';
    }
}

function renderClasses(classes) {
    const c = document.getElementById('classes-container');
    if (!classes.length) { c.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">No classes yet. Click "Add Class" to create one.</p>'; return; }
    c.innerHTML = classes.map(cls => `
        <div class="bg-white shadow-lg rounded-lg overflow-hidden card-hover">
            <div class="p-6">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-lg font-medium text-gray-900">${esc(cls.name)}</h3>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-primary-100 text-primary-800">${esc(cls.level || 'All Levels')}</span>
                </div>
                <div class="space-y-2 text-sm text-gray-600">
                    <p><i class="fas fa-calendar-day mr-2 text-gray-400"></i>${esc(cls.day_name)}</p>
                    <p><i class="fas fa-clock mr-2 text-gray-400"></i>${esc(cls.start_time)} - ${esc(cls.end_time)}</p>
                    <p><i class="fas fa-user mr-2 text-gray-400"></i>${esc(cls.instructor_name)}</p>
                    <p><i class="fas fa-users mr-2 text-gray-400"></i>${cls.enrolled_count}/${cls.max_students} students</p>
                </div>
                <button data-class-id="${cls.id}" data-class-name="${esc(cls.name)}" class="enroll-btn mt-4 w-full inline-flex justify-center items-center px-3 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                    <i class="fas fa-user-plus mr-2"></i>Manage Students
                </button>
            </div>
        </div>
    `).join('');
    document.querySelectorAll('.enroll-btn').forEach(btn => {
        btn.addEventListener('click', () => openEnrollModal(parseInt(btn.dataset.classId), btn.dataset.className));
    });
}

function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Class';
    document.getElementById('class-form').reset();
    document.getElementById('class-id').value = '';
    document.getElementById('class-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('class-modal').classList.add('hidden'); }

async function saveClass(e) {
    e.preventDefault();
    const body = { name: document.getElementById('class-name').value, day_of_week: parseInt(document.getElementById('day-of-week').value), start_time: document.getElementById('start-time').value, end_time: document.getElementById('end-time').value, level: document.getElementById('level').value, max_students: parseInt(document.getElementById('max-students').value) || 20 };
    try {
        const res = await fetch('/api/classes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        if (res.ok) { closeModal(); loadClasses(); } else { const d = await res.json(); alert(d.error || 'Error saving class'); }
    } catch (err) { alert('Network error'); }
}

let currentClassId = null;

async function openEnrollModal(classId, className) {
    currentClassId = classId;
    document.getElementById('enroll-modal-title').textContent = `Students in ${className}`;
    document.getElementById('enroll-modal').classList.remove('hidden');
    toggleAddSection(false);
    loadEnrollments();
}

function closeEnrollModal() {
    document.getElementById('enroll-modal').classList.add('hidden');
    currentClassId = null;
    loadClasses();
}

async function toggleAddSection(show) {
    document.getElementById('add-students-section').classList.toggle('hidden', !show);
    document.getElementById('add-btn-row').classList.toggle('hidden', show);
    if (show) {
        const [studentsRes, enrollRes] = await Promise.all([
            fetch('/api/students?per_page=100'),
            fetch(`/api/classes/${currentClassId}/enrollments`)
        ]);
        const studentsData = await studentsRes.json();
        const enrollData = await enrollRes.json();
        const enrolledIds = new Set(enrollData.enrollments.map(e => e.student_id));
        const available = studentsData.students.filter(s => !enrolledIds.has(s.id));
        const cl = document.getElementById('student-checklist');
        if (!available.length) {
            cl.innerHTML = '<p class="text-gray-500 text-sm py-2 text-center">All students are already enrolled.</p>';
            return;
        }
        cl.innerHTML = available.map(s => `
            <label class="flex items-center px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer">
                <input type="checkbox" value="${s.id}" class="student-cb h-4 w-4 text-primary-600 border-gray-300 rounded mr-3">
                <span class="text-sm text-gray-900">${esc(s.full_name)}</span>
            </label>
        `).join('');
    }
}

async function loadEnrollments() {
    const el = document.getElementById('enrolled-students');
    try {
        const res = await fetch(`/api/classes/${currentClassId}/enrollments`);
        const data = await res.json();
        if (!data.enrollments.length) {
            el.innerHTML = '<p class="text-gray-500 text-sm py-4 text-center">No students enrolled yet.</p>';
            return;
        }
        el.innerHTML = data.enrollments.map(e => `
            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                <div class="flex items-center">
                    <div class="h-8 w-8 rounded-full bg-primary-100 flex items-center justify-center">
                        <span class="text-xs font-medium text-primary-700">${esc(e.full_name[0])}</span>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-gray-900">${esc(e.full_name)}</p>
                        <p class="text-xs text-gray-500">Enrolled ${e.enrolled_date}</p>
                    </div>
                </div>
                <button data-enrollment-id="${e.enrollment_id}" class="unenroll-btn text-red-500 hover:text-red-700 text-sm"><i class="fas fa-times"></i></button>
            </div>
        `).join('');
        el.querySelectorAll('.unenroll-btn').forEach(btn => {
            btn.addEventListener('click', () => unenrollStudent(parseInt(btn.dataset.enrollmentId)));
        });
    } catch (err) { el.innerHTML = '<p class="text-red-500 text-sm">Failed to load</p>'; }
}

async function enrollSelected() {
    const checked = [...document.querySelectorAll('.student-cb:checked')].map(cb => parseInt(cb.value));
    if (!checked.length) { alert('Select at least one student'); return; }
    try {
        const res = await fetch(`/api/classes/${currentClassId}/enroll`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ student_ids: checked })
        });
        const data = await res.json();
        if (res.ok) { toggleAddSection(false); loadEnrollments(); }
        else { alert(data.error || 'Enrollment failed'); }
    } catch (err) { alert('Network error'); }
}

async function unenrollStudent(enrollmentId) {
    if (!confirm('Remove this student from the class?')) return;
    await fetch(`/api/enrollments/${enrollmentId}`, { method: 'DELETE' });
    loadEnrollments();
}

loadClasses();
</script>
{% endblock %}
