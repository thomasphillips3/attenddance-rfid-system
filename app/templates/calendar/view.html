{% extends "base.html" %}
{% block content %}
<div class="min-h-full">
    <div class="bg-white shadow">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold text-gray-900"><i class="fas fa-calendar-week text-primary-500 mr-2"></i>Weekly Calendar</h1>
            <p class="mt-1 text-sm text-gray-600">All classes by day and time</p>
        </div>
    </div>
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-3">
            <p class="text-gray-500">Loading…</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const COLORS = ['bg-indigo-50 border-indigo-200','bg-rose-50 border-rose-200','bg-amber-50 border-amber-200','bg-emerald-50 border-emerald-200','bg-sky-50 border-sky-200','bg-violet-50 border-violet-200'];
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function to12(hhmm){ if(!hhmm) return ''; const [h,m]=hhmm.split(':').map(Number); const ap=h>=12?'PM':'AM'; const h12=h%12||12; return `${h12}:${String(m).padStart(2,'0')} ${ap}`; }

async function load(){
    const grid=document.getElementById('grid');
    let classes=[];
    try { classes=(await (await fetch('/api/classes')).json()).classes||[]; }
    catch { grid.innerHTML='<p class="text-red-500">Failed to load classes.</p>'; return; }

    // color per location for consistency
    const locColor={}; let ci=0;
    const byDay = DAYS.map(()=>[]);
    classes.forEach(c=>{
        const key=c.location_name||'_';
        if(!(key in locColor)){ locColor[key]=COLORS[ci%COLORS.length]; ci++; }
        if(c.day_of_week>=0 && c.day_of_week<7) byDay[c.day_of_week].push(c);
    });
    byDay.forEach(list=>list.sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||'')));

    grid.innerHTML = DAYS.map((day,di)=>`
        <div>
            <h3 class="text-sm font-semibold text-gray-700 text-center mb-2 pb-1 border-b">${day}</h3>
            <div class="space-y-2">
                ${byDay[di].length ? byDay[di].map(c=>`
                    <div class="border rounded-lg p-2 ${locColor[c.location_name||'_']}">
                        <div class="text-xs font-semibold text-gray-800">${to12(c.start_time)}–${to12(c.end_time)}</div>
                        <div class="text-sm font-medium text-gray-900">${esc(c.name)}</div>
                        <div class="text-xs text-gray-500">${esc(c.instructor_name||'')}</div>
                        ${c.location_name?`<div class="text-xs text-gray-400"><i class="fas fa-map-marker-alt mr-1"></i>${esc(c.location_name)}</div>`:''}
                        <div class="text-xs ${c.max_students && c.enrolled_count>=c.max_students ? 'text-red-500 font-medium' : 'text-gray-400'}">${c.enrolled_count}${c.max_students?'/'+c.max_students:''} enrolled${c.max_students && c.enrolled_count>=c.max_students?' · full':''}</div>
                    </div>`).join('') : '<p class="text-xs text-gray-300 text-center py-2">—</p>'}
            </div>
        </div>`).join('');
}
load();
</script>
{% endblock %}
